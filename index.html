<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>計量入力 keiryo-input</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

header {
  background: linear-gradient(135deg, #2b6cb0, #1a4a8a);
  color: white; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
header h1 { font-size: 17px; font-weight: 700; }

.card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.card-title { font-size: 12px; color: #718096; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

label { font-size: 13px; color: #4a5568; font-weight: 600; display: block; margin-bottom: 6px; }

select, input[type=date], input[type=text] {
  width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px;
  padding: 10px 12px; font-size: 15px; font-family: inherit;
  background: white; appearance: none; -webkit-appearance: none;
}
select:focus, input:focus { outline: none; border-color: #2b6cb0; }

.field-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.field-label { flex: 1; font-size: 14px; color: #2d3748; }
.field-input-wrap { display: flex; align-items: center; gap: 4px; }
.field-input {
  width: 90px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  padding: 8px 10px; font-size: 16px; text-align: right; font-family: inherit;
}
.field-input:focus { outline: none; border-color: #2b6cb0; }
.field-unit { font-size: 12px; color: #718096; min-width: 24px; }

.btn-save {
  width: 100%; padding: 16px; border: none; border-radius: 12px;
  font-size: 17px; font-weight: 700; cursor: pointer;
  background: linear-gradient(135deg, #38a169, #276749); color: white;
  box-shadow: 0 4px 12px rgba(56,161,105,.4); margin-top: 4px;
  transition: transform .1s;
}
.btn-save:active { transform: scale(.97); }

.btn-memo {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: #f0fff4; color: #276749; border: 1.5px solid #9ae6b4;
  margin-bottom: 10px;
}
.btn-file {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: #faf5ff; color: #6b46c1; border: 1.5px solid #d6bcfa;
  margin-bottom: 10px;
}
.btn-clear-all {
  background: #fff5f5; color: #c53030; border: 1.5px solid #fed7d7;
  padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
}

.status-msg { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 13px; display: none; }
.status-msg.ok { background: #f0fff4; color: #276749; display: block; }
.status-msg.error { background: #fff5f5; color: #c53030; display: block; }

/* 設定 */
.setting-label { font-size: 12px; color: #718096; margin-bottom: 6px; font-weight: 600; }
.setting-input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; }
.setting-input:focus { outline: none; border-color: #2b6cb0; }
.setting-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; background: #2b6cb0; color: white; margin-top: 6px; }
.settings-area { display: none; margin-top: 14px; }
.settings-area.open { display: block; }
.btn-settings { background: none; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #4a5568; cursor: pointer; }

/* メモモーダル */
.memo-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 200; padding: 60px 14px 14px;
  overflow-y: auto;
}
.memo-overlay.open { display: block; }
.memo-modal { background: #fff; border-radius: 18px; max-width: 560px; margin: 0 auto; overflow: hidden; }
.memo-modal-header {
  padding: 16px 18px 12px; border-bottom: 1px solid #e2e8f0;
  display: flex; align-items: center; justify-content: space-between;
}
.memo-modal-title { font-size: 16px; font-weight: 700; }
.btn-close-memo { background: none; border: none; font-size: 22px; color: #718096; cursor: pointer; }
.memo-tabs { display: flex; border-bottom: 1px solid #e2e8f0; }
.memo-tab-btn { flex: 1; padding: 9px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; border-bottom: 2px solid transparent; }
.memo-tab-btn.active { background: #ebf8ff; color: #2b6cb0; border-bottom-color: #2b6cb0; }
.memo-tab-btn:not(.active) { background: white; color: #718096; }
.memo-date-row { padding: 12px 18px; border-bottom: 1px solid #e2e8f0; }
.memo-date-row input[type=date] { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; }
.memo-body { padding: 14px 18px; max-height: 55vh; overflow-y: auto; }
.memo-item { padding: 10px 0; border-bottom: 1px solid #f0f4f8; }
.memo-item:last-child { border-bottom: none; }
.memo-item-company { font-weight: 700; color: #2b6cb0; font-size: 14px; }
.memo-item-values { font-size: 13px; color: #4a5568; margin-top: 3px; }
.memo-item-meta { font-size: 11px; color: #a0aec0; margin-top: 2px; }
.memo-empty { text-align: center; color: #a0aec0; font-size: 14px; padding: 20px 0; }
.btn-resend {
  width: 100%; padding: 10px; margin-bottom: 10px;
  background: #ebf8ff; color: #2b6cb0; border: 1.5px solid #bee3f8;
  border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
}

/* トースト */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #1a202c; color: white; padding: 12px 22px;
  border-radius: 24px; font-size: 14px; z-index: 999;
  opacity: 0; pointer-events: none; transition: opacity .3s; white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>📋 計量入力</h1>
  <span style="font-size:11px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:12px;" id="staff-badge">未設定</span>
</header>

<div style="padding:14px;max-width:600px;margin:0 auto;">

  <!-- メモ確認・ファイル保存 -->
  <button class="btn-memo" onclick="showMemo()">📋 メモを確認</button>

  <!-- 日付・会社選択 -->
  <div class="card">
    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <div style="flex:1">
        <label>📅 日付</label>
        <input type="date" id="date-input">
      </div>
    </div>
    <label>🏢 会社名</label>
    <select id="company-select" onchange="onCompanyChange()">
      <option value="">-- 会社を選択 --</option>
    </select>
  </div>

  <!-- 数値入力 -->
  <div class="card" id="fields-card" style="display:none">
    <div class="card-title">数値入力</div>
    <div id="fields-container"></div>
    <button class="btn-save" onclick="saveToSheet()">📤 Googleスプレッドシートに保存</button>
    <button class="btn-file" onclick="saveToFileApp()" style="margin-top:8px;">📁 ファイルに保存（保存先選択）</button>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <!-- 入力者・設定 -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <label style="margin:0;">👤 入力者名</label>
      <button class="btn-settings" onclick="toggleSettings()">⚙ 設定</button>
    </div>
    <input type="text" id="input-by" placeholder="例：田中" oninput="saveInputBy()">
    <div class="settings-area" id="settings-area">
      <div style="margin-top:14px;">
        <div class="setting-label">Apps Script URL</div>
        <input class="setting-input" id="script-url" type="url" placeholder="https://script.google.com/macros/s/...">
        <button class="setting-btn" onclick="saveScriptUrl()">💾 URL保存</button>
      </div>
      <div style="margin-top:14px;">
        <div class="setting-label">スプレッドシートURL（直接リンク用）</div>
        <input class="setting-input" id="sheets-direct-url" type="url" placeholder="https://docs.google.com/spreadsheets/d/...">
        <button class="setting-btn" onclick="saveSheetsDirectUrl()">💾 URL保存</button>
        <p style="font-size:12px;color:#a0aec0;margin-top:6px">※ メモ確認→スプレッドシートタブで直接開けます</p>
      </div>
    </div>
  </div>

</div>

<!-- メモモーダル -->
<div class="memo-overlay" id="memo-overlay" onclick="closeMemoOnBg(event)">
  <div class="memo-modal">
    <div class="memo-modal-header">
      <span class="memo-modal-title">📋 メモを確認</span>
      <button class="btn-close-memo" onclick="closeMemo()">✕</button>
    </div>
    <div class="memo-date-row">
      <input type="date" id="memo-date-input" onchange="onMemoDateChange(this.value)">
    </div>
    <div class="memo-tabs">
      <button class="memo-tab-btn active" id="memo-tab-local" onclick="switchMemoTab('local')">📱 自分のメモ</button>
      <button class="memo-tab-btn" id="memo-tab-sheets" onclick="switchMemoTab('sheets')">📊 スプレッドシート</button>
    </div>
    <div class="memo-body" id="memo-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBMsrw8hUVAzB-wu28y5Zj49B9H_U8cU_Wf3afTOk6o4dyn7zo7XkPM8sIPuz_xY6H/exec';

// 会社データ
const COMPANIES = [
  {name:'LAMU', file:'LA・MU.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'可燃物',unit:'kg'},{label:'不燃物',unit:'袋'},{label:'生ごみ',unit:'kg'},{label:'段ボール',unit:'kg'},{label:'その他',unit:'袋'}]},

  {name:'ドンキー', file:'イオンタウン、びっくりドンキー 伊賀上野店、KFC.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'生ごみ',unit:'kg'}]},
  {name:'KFC', file:'イオンタウン、びっくりドンキー 伊賀上野店、KFC.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'生ごみ',unit:'kg'}]},
  {name:'コカコーラ', file:'コカ・コーラボトラーズ.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'緑ヶ丘東町', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'東条', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'平野北谷', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'四十九町北', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'緑ヶ丘本町', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'平野東町', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'忍者市駅南', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'セカンドストリート', file:'セブンイレブン、セカンドストリート.xlsx', sheet:'回収実績入力_', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'チョーヤ', file:'チョーヤ梅酒.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'マックスバリュ上野', file:'マックスバリュ上野店.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'可燃物',unit:'kg'},{label:'不燃物',unit:'袋'},{label:'生ごみ',unit:'kg'},{label:'段ボール',unit:'kg'},{label:'アラ',unit:'kg'}]},
  {name:'マックスバリュ佐那具', file:'マックスバリュ佐那具店.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'可燃物',unit:'kg'},{label:'不燃物',unit:'袋'},{label:'生ごみ',unit:'kg'},{label:'段ボール',unit:'kg'}]},
  {name:'戸島屋', file:'㈱やさいの戸島屋.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'生ごみ',unit:'kg'},{label:'段ボール',unit:'kg'}]},
  {name:'伊賀庁舎', file:'三重県伊賀庁舎.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'法務庁舎', file:'上野法務合同庁舎.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'伊賀の街', file:'伊賀の街, ライフテクノサービス.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'ライフテクノ', file:'伊賀の街, ライフテクノサービス.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'神戸駅', file:'伊賀神戸駅.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'厚板', file:'厚板プレス工業（株）.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'}]},
  {name:'大本', file:'大本紙料（株）ドラッグセイムス.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'}]},
  {name:'セイムス', file:'大本紙料（株）ドラッグセイムス.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'}]},
  {name:'旧上野庁舎', file:'旧上野庁舎　SAKAKURABASE.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'サカクラ', file:'旧上野庁舎　SAKAKURABASE.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'}]},
  {name:'古本市場', file:'株式会社サイリス 大阪支店　古本市場　上野店.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'裁判所', file:'津地方裁判所.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'農業屋', file:'農業屋 伊賀上野店.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'不燃物',unit:'袋'},{label:'段ボール',unit:'kg'}]},
  {name:'飯田', file:'飯田金属.xlsx', fields:[{label:'金属缶',unit:'kg'},{label:'不燃物',unit:'kg'}]},
  {name:'魚民', file:'魚民 上野市駅前店.xlsx', fields:[{label:'可燃物',unit:'袋'},{label:'生ごみ',unit:'kg'}]}
];

let currentCompany = null;

// ===== 初期化 =====
function init() {
  document.getElementById('date-input').value = getTodayStr();
  const savedBy = localStorage.getItem('inputBy') || '';
  document.getElementById('input-by').value = savedBy;
  updateStaffBadge(savedBy);
  const url = localStorage.getItem('scriptUrl') || DEFAULT_SCRIPT_URL;
  document.getElementById('script-url').value = url;
  if (!localStorage.getItem('scriptUrl')) localStorage.setItem('scriptUrl', DEFAULT_SCRIPT_URL);
  const sheetsUrl = localStorage.getItem('sheetsDirectUrl') || '';
  document.getElementById('sheets-direct-url').value = sheetsUrl;
  // 会社リスト
  const sel = document.getElementById('company-select');
  COMPANIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name; opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function updateStaffBadge(name) {
  document.getElementById('staff-badge').textContent = name || '未設定';
}

function saveInputBy() {
  const name = document.getElementById('input-by').value;
  localStorage.setItem('inputBy', name);
  updateStaffBadge(name);
}

function toggleSettings() {
  document.getElementById('settings-area').classList.toggle('open');
}

function saveScriptUrl() {
  const url = document.getElementById('script-url').value.trim();
  localStorage.setItem('scriptUrl', url);
  showToast('✅ URL保存しました');
}

// ===== 会社選択 =====
function onCompanyChange() {
  const name = document.getElementById('company-select').value;
  currentCompany = COMPANIES.find(c => c.name === name) || null;
  const card = document.getElementById('fields-card');
  const container = document.getElementById('fields-container');
  if (!currentCompany) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  container.innerHTML = '';
  currentCompany.fields.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'field-row';
    row.innerHTML = `
      <div class="field-label">${f.label}</div>
      <div class="field-input-wrap">
        <input class="field-input" type="number" id="field-${i}" placeholder="0" min="0" step="0.1">
        <span class="field-unit">${f.unit}</span>
      </div>`;
    container.appendChild(row);
  });
  document.getElementById('status-msg').style.display = 'none';
  card.scrollIntoView({ behavior: 'smooth' });
}

// ===== スプレッドシートに保存 =====
async function saveToSheet() {
  if (!currentCompany) return;
  const url = localStorage.getItem('scriptUrl') || DEFAULT_SCRIPT_URL;
  const dateVal = document.getElementById('date-input').value;
  const inputBy = document.getElementById('input-by').value;
  const parts = dateVal.split('-');
  const month = parts[0] + '年' + parseInt(parts[1]) + '月';

  const fields = currentCompany.fields.map((f, i) => ({
    label: f.label, unit: f.unit,
    value: document.getElementById('field-' + i).value || ''
  }));

  const payload = { date: dateVal, month, companyName: currentCompany.name, inputBy, fields, memo: '' };

  // localStorageにも保存
  const memoKey = 'savedMemo_' + dateVal;
  const existing = JSON.parse(localStorage.getItem(memoKey) || '[]');
  existing.push({ ...payload, savedAt: new Date().toISOString() });
  localStorage.setItem(memoKey, JSON.stringify(existing));

  showStatus('ok', '📡 送信中...');
  try {
    await fetch(url, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showStatus('ok', '✅ ' + currentCompany.name + ' を保存しました');
    // 入力クリア
    currentCompany.fields.forEach((_, i) => { document.getElementById('field-' + i).value = ''; });
  } catch(e) {
    showStatus('error', '⚠ 送信エラー（ローカルには保存済み）');
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status-msg');
  el.className = 'status-msg ' + type;
  el.textContent = msg;
}

// ===== ファイルに保存 =====
function saveToFileApp() {
  const dateVal = document.getElementById('date-input').value;
  const stored = JSON.parse(localStorage.getItem('savedMemo_' + dateVal) || '[]');
  if (!stored.length) { showToast('この日の記録がありません'); return; }
  const label = dateVal.replace(/-/g,'');
  const lines = [`=== 計量メモ ${label} ===\n`];
  stored.forEach(r => {
    const t = new Date(r.savedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const vals = (r.fields||[]).filter(f=>f.value).map(f=>`${f.label}${f.value}${f.unit}`).join('　');
    lines.push(`[${t}] ${r.inputBy ? '【'+r.inputBy+'】' : ''}${r.companyName}　${vals}`);
  });
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '計量メモ_' + label + '.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('📁 ファイルアプリで保存先を選んでください');
}

// ===== メモ確認 =====
let currentMemoTab = 'local';
let currentMemoDate = '';

function showMemo() {
  const today = getTodayStr();
  currentMemoDate = today;
  document.getElementById('memo-date-input').value = today;
  document.getElementById('memo-overlay').classList.add('open');
  showMemoLocal(today);
}

function closeMemo() { document.getElementById('memo-overlay').classList.remove('open'); }
function closeMemoOnBg(e) { if (e.target === document.getElementById('memo-overlay')) closeMemo(); }

function onMemoDateChange(dateStr) {
  currentMemoDate = dateStr;
  if (currentMemoTab === 'local') showMemoLocal(dateStr);
  else fetchSheetsData(dateStr);
}

function switchMemoTab(tab) {
  currentMemoTab = tab;
  document.getElementById('memo-tab-local').className = 'memo-tab-btn' + (tab==='local'?' active':'');
  document.getElementById('memo-tab-sheets').className = 'memo-tab-btn' + (tab==='sheets'?' active':'');
  if (tab === 'local') showMemoLocal(currentMemoDate);
  else fetchSheetsData(currentMemoDate);
}

function showMemoLocal(dateStr) {
  const stored = JSON.parse(localStorage.getItem('savedMemo_' + dateStr) || '[]');
  const body = document.getElementById('memo-body');
  if (!stored.length) {
    body.innerHTML = '<div class="memo-empty">この日の記録はありません</div>';
    return;
  }
  let html = `<div style="display:flex;gap:6px;margin-bottom:10px;">
    <button class="btn-resend" style="flex:1;" onclick="resendAllToSheets('${dateStr}')">📤 全件送信</button>
    <button class="btn-resend" style="flex:1;background:#fff5f5;color:#c53030;border-color:#fed7d7;" onclick="deduplicateMemos('${dateStr}')">🧹 重複削除</button>
  </div>`;
  stored.forEach(r => {
    const vals = (r.fields||[]).filter(f=>f.value).map(f=>`${f.label}:${f.value}${f.unit}`).join('　');
    html += `<div class="memo-item">
      <div class="memo-item-company">🏢 ${r.companyName}</div>
      <div class="memo-item-values">${vals||'（入力なし）'}</div>
      ${r.inputBy ? `<div class="memo-item-meta">👤 ${r.inputBy}</div>` : ''}
    </div>`;
  });
  body.innerHTML = html;
}

function deduplicateMemos(dateStr) {
  const stored = JSON.parse(localStorage.getItem('savedMemo_' + dateStr) || '[]');
  if (!stored.length) { showToast('記録がありません'); return; }
  const seen = {};
  const deduped = [];
  for (let i = stored.length - 1; i >= 0; i--) {
    const key = stored[i].companyName;
    if (!seen[key]) { seen[key] = true; deduped.unshift(stored[i]); }
  }
  if (deduped.length === stored.length) { showToast('重複はありませんでした'); return; }
  const removed = stored.length - deduped.length;
  localStorage.setItem('savedMemo_' + dateStr, JSON.stringify(deduped));
  showToast('✅ ' + removed + '件の重複を削除しました');
  showMemoLocal(dateStr);
}

function resendAllToSheets(dateStr) {
  const stored = JSON.parse(localStorage.getItem('savedMemo_' + dateStr) || '[]');
  if (!stored.length) { showToast('送信するデータがありません'); return; }
  const url = localStorage.getItem('scriptUrl') || DEFAULT_SCRIPT_URL;
  let sent = 0;
  stored.forEach(r => {
    fetch(url, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(r)
    }).then(() => { sent++; if (sent===stored.length) showToast('✅ '+sent+'件送信しました'); })
     .catch(() => showToast('⚠ 送信エラー'));
  });
}

function sheetsOpenButton() {
  const url = localStorage.getItem('sheetsDirectUrl') || '';
  if (!url) return `<p style="font-size:12px;color:#a0aec0;margin-top:10px;text-align:center">⚙ 設定から「スプレッドシートURL」を保存すると直接開けます</p>`;
  return `<a href="${url}" target="_blank" style="display:block;width:100%;padding:12px;text-align:center;background:#f0fff4;color:#276749;border:1.5px solid #9ae6b4;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;margin-top:8px;">📊 スプレッドシートを直接開く</a>`;
}

function saveSheetsDirectUrl() {
  const url = document.getElementById('sheets-direct-url').value.trim();
  localStorage.setItem('sheetsDirectUrl', url);
  showToast('✅ スプレッドシートURLを保存しました');
}

function fetchSheetsData(dateStr) {
  const url = localStorage.getItem('scriptUrl') || DEFAULT_SCRIPT_URL;
  const body = document.getElementById('memo-body');
  if (!url) { body.innerHTML = '<div class="memo-empty">⚙ URLが未設定です</div>'; return; }
  const parts = dateStr.split('-');
  const monthParam = parts[0] + '年' + parseInt(parts[1]) + '月';
  body.innerHTML = '<div class="memo-empty">📡 取得中...</div>';
  const cbName = 'sheetsCb_' + Date.now();
  let jsonpTimeout;
  window[cbName] = function(data) {
    clearTimeout(jsonpTimeout);
    delete window[cbName];
    const s = document.getElementById('jsonp-' + cbName); if (s) s.remove();
    if (!data.records || !data.records.length) {
      body.innerHTML = '<div class="memo-empty">この日のスプレッドシート記録はありません</div>' + sheetsOpenButton(); return;
    }
    const d = new Date(dateStr);
    let html = sheetsOpenButton() + `<div style="font-size:13px;color:#718096;margin-bottom:8px;font-weight:600;margin-top:8px">${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日　${data.records.length}件（全スタッフ）</div>`;
    data.records.forEach(r => {
      const company = r['会社名']||'';
      const staff = r['入力者']||'';
      const vals = ['可燃(袋)','可燃(kg)','不燃(袋)','不燃(kg)','カン(kg)','ビン(kg)','生ごみ(kg)','段ボール(kg)','アラ(kg)','PET(袋)','その他(袋)','その他(kg)']
        .filter(k=>r[k]!==''&&r[k]!==null&&r[k]!==undefined).map(k=>`${k}:${r[k]}`).join('　');
      html += `<div class="memo-item">
        <div class="memo-item-company">🏢 ${company}</div>
        <div class="memo-item-values">${vals||'（数値なし）'}</div>
        ${staff?`<div class="memo-item-meta">👤 ${staff}</div>`:''}
      </div>`;
    });
    body.innerHTML = html;
  };
  const script = document.createElement('script');
  script.id = 'jsonp-' + cbName;
  script.onerror = () => {
    clearTimeout(jsonpTimeout);
    delete window[cbName]; script.remove();
    body.innerHTML = `<div style="padding:4px"><p style="color:#c53030;font-size:13px;margin-bottom:8px">⚠ 自動取得できませんでした</p>${sheetsOpenButton()}</div>`;
  };
  script.src = url + '?date=' + dateStr + '&month=' + encodeURIComponent(monthParam) + '&callback=' + cbName;
  jsonpTimeout = setTimeout(() => {
    if (window[cbName]) {
      delete window[cbName]; script.remove();
      body.innerHTML = `<div style="padding:4px"><p style="color:#c53030;font-size:13px;margin-bottom:8px">⚠ タイムアウト</p>${sheetsOpenButton()}</div>`;
    }
  }, 10000);
  document.head.appendChild(script);
}

// ===== トースト =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
