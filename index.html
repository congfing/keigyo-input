<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>計量入力</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding: 16px;
  }
  h1 {
    text-align: center;
    font-size: 18px;
    color: #1a202c;
    margin-bottom: 16px;
    padding: 12px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #718096;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="date"],
  select {
    width: 100%;
    padding: 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 16px;
    color: #2d3748;
    background: #f7fafc;
    appearance: none;
    -webkit-appearance: none;
  }
  input[type="date"]:focus,
  select:focus {
    outline: none;
    border-color: #4299e1;
    background: #fff;
  }
  .fields-area { display: none; }
  .fields-area.active { display: block; }
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .field-label {
    flex: 1;
    font-size: 15px;
    color: #2d3748;
    font-weight: 500;
  }
  .field-unit {
    font-size: 13px;
    color: #a0aec0;
    width: 30px;
    text-align: center;
  }
  .field-input {
    width: 90px;
    padding: 10px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 20px;
    text-align: right;
    color: #2d3748;
    background: #f7fafc;
  }
  .field-input:focus {
    outline: none;
    border-color: #4299e1;
    background: #fff;
  }
  .btn-add {
    width: 100%;
    padding: 14px;
    background: #4299e1;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .btn-add:active { background: #2b6cb0; }
  .btn-add:disabled { background: #a0aec0; }

  /* 入力リスト */
  #list-area { display: none; }
  #list-area.has-items { display: block; }
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .list-title { font-size: 14px; font-weight: 700; color: #2d3748; }
  .btn-clear-all {
    padding: 4px 10px;
    background: #fed7d7;
    color: #c53030;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .list-item {
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .list-item-text {
    font-size: 14px;
    color: #2d3748;
    line-height: 1.5;
    flex: 1;
    word-break: break-all;
  }
  .btn-delete {
    background: none;
    border: none;
    color: #fc8181;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .btn-copy {
    width: 100%;
    padding: 16px;
    background: #48bb78;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-copy:active { background: #276749; }
  .copy-done {
    text-align: center;
    font-size: 14px;
    color: #48bb78;
    font-weight: 700;
    margin-top: 8px;
    display: none;
  }
  .loading {
    text-align: center;
    color: #a0aec0;
    font-size: 14px;
    padding: 20px;
  }
  .error-msg {
    color: #c53030;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }
</style>
</head>
<body>
<h1>📦 計量入力</h1>

<!-- 日付 -->
<div class="card">
  <label>📅 収集日</label>
  <input type="date" id="date-input">
</div>

<!-- 会社選択 -->
<div class="card">
  <label>🏢 会社名</label>
  <div id="loading" class="loading">会社リスト読み込み中…</div>
  <select id="company-select" style="display:none">
    <option value="">-- 選択してください --</option>
  </select>
  <div id="load-error" class="error-msg">⚠️ 会社リストの読み込みに失敗しました</div>
</div>

<!-- 入力フィールド -->
<div class="card fields-area" id="fields-area">
  <label>📊 数値入力</label>
  <div id="fields-container"></div>
  <button class="btn-add" id="btn-add" onclick="addEntry()">リストに追加 ＋</button>
</div>

<!-- 入力リスト -->
<div class="card" id="list-area">
  <div class="list-header">
    <span class="list-title">📋 入力リスト</span>
    <button class="btn-clear-all" onclick="clearAll()">全削除</button>
  </div>
  <div id="entry-list"></div>
  <button class="btn-copy" onclick="copyAll()">📋 クリップボードにコピー</button>
  <div class="copy-done" id="copy-done">✅ コピーしました！Claudeに貼り付けてください</div>
</div>

<script>
// GitHubのraw URLに変更してください
const COMPANIES_JSON_URL = 'companies.json';

let companies = [];
let entries = [];

// 日付初期値（今日）
function getTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
document.getElementById('date-input').value = getTodayStr();

// 会社リスト読み込み
async function loadCompanies() {
  try {
    const url = COMPANIES_JSON_URL + '?v=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    companies = data.companies;
    buildSelect();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('company-select').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('load-error').style.display = 'block';
  }
}

function buildSelect() {
  const sel = document.getElementById('company-select');
  companies.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

document.getElementById('company-select').addEventListener('change', function() {
  const id = this.value;
  const area = document.getElementById('fields-area');
  const container = document.getElementById('fields-container');
  container.innerHTML = '';
  if (!id) { area.classList.remove('active'); return; }
  const company = companies.find(c => c.id === id);
  if (!company) return;
  company.fields.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'field-row';
    row.innerHTML = `
      <span class="field-label">${f.label}</span>
      <input type="number" class="field-input" id="field-${i}"
             inputmode="decimal" placeholder="0" min="0" step="any">
      <span class="field-unit">${f.unit}</span>
    `;
    container.appendChild(row);
  });
  area.classList.add('active');
  // 最初のフィールドにフォーカス
  setTimeout(() => {
    const first = document.getElementById('field-0');
    if (first) first.focus();
  }, 100);
});

function addEntry() {
  const dateVal = document.getElementById('date-input').value;
  const companyId = document.getElementById('company-select').value;
  if (!dateVal || !companyId) return;

  const company = companies.find(c => c.id === companyId);
  if (!company) return;

  // 日付フォーマット: YYMMDD
  const d = new Date(dateVal);
  const yy = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const dateShort = yy + mm + dd;

  let parts = [company.name];
  company.fields.forEach((f, i) => {
    const inp = document.getElementById(`field-${i}`);
    const val = inp ? inp.value.trim() : '';
    if (val !== '' && val !== null) {
      parts.push(`${f.label}${val}${f.unit}`);
    }
  });

  const text = `${dateShort} ${parts.join(' ')}`;
  entries.push({ date: dateVal, text });

  renderList();

  // フィールドクリア
  company.fields.forEach((_, i) => {
    const inp = document.getElementById(`field-${i}`);
    if (inp) inp.value = '';
  });
  document.getElementById('field-0')?.focus();
}

function renderList() {
  const listEl = document.getElementById('entry-list');
  const listArea = document.getElementById('list-area');
  listEl.innerHTML = '';
  if (entries.length === 0) {
    listArea.classList.remove('has-items');
    return;
  }
  listArea.classList.add('has-items');
  entries.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.innerHTML = `
      <span class="list-item-text">${e.text}</span>
      <button class="btn-delete" onclick="deleteEntry(${i})">✕</button>
    `;
    listEl.appendChild(item);
  });
}

function deleteEntry(i) {
  entries.splice(i, 1);
  renderList();
}

function clearAll() {
  if (!confirm('リストをすべて削除しますか？')) return;
  entries = [];
  renderList();
}

function copyAll() {
  const text = entries.map(e => e.text).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copy-done');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  }).catch(() => {
    // フォールバック
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const msg = document.getElementById('copy-done');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  });
}

// Enter キーで次のフィールドへ or 追加
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const active = document.activeElement;
    if (active && active.classList.contains('field-input')) {
      const id = active.id;
      const idx = parseInt(id.split('-')[1]);
      const next = document.getElementById(`field-${idx+1}`);
      if (next) { next.focus(); }
      else { addEntry(); }
    }
  }
});

loadCompanies();
</script>
</body>
</html>
