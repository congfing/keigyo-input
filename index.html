<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>計量入力</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding: 16px;
  }
  h1 {
    text-align: center;
    font-size: 18px;
    color: #1a202c;
    margin-bottom: 16px;
    padding: 12px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #718096;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="date"], input[type="text"], select {
    width: 100%;
    padding: 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 16px;
    color: #2d3748;
    background: #f7fafc;
    appearance: none;
    -webkit-appearance: none;
  }
  input[type="date"]:focus, input[type="text"]:focus, select:focus {
    outline: none;
    border-color: #4299e1;
    background: #fff;
  }
  .fields-area { display: none; }
  .fields-area.active { display: block; }
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .field-label { flex: 1; font-size: 15px; color: #2d3748; font-weight: 500; }
  .field-unit { font-size: 13px; color: #a0aec0; width: 30px; text-align: center; }
  .field-input {
    width: 90px;
    padding: 10px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 20px;
    text-align: right;
    color: #2d3748;
    background: #f7fafc;
  }
  .field-input:focus { outline: none; border-color: #4299e1; background: #fff; }
  .btn-add {
    width: 100%;
    padding: 14px;
    background: #4299e1;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-add:active { background: #2b6cb0; }

  /* リスト */
  #list-area { display: none; }
  #list-area.has-items { display: block; }
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .list-title { font-size: 14px; font-weight: 700; color: #2d3748; }
  .btn-clear-all {
    padding: 4px 10px;
    background: #fed7d7;
    color: #c53030;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .list-item {
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .list-item-text { font-size: 14px; color: #2d3748; line-height: 1.5; flex: 1; word-break: break-all; }
  .btn-delete { background: none; border: none; color: #fc8181; font-size: 18px; cursor: pointer; padding: 0 4px; }

  /* 保存・送信ボタン */
  .btn-save {
    width: 100%;
    padding: 16px;
    background: #48bb78;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-save:active { background: #276749; }
  .btn-save:disabled { background: #a0aec0; }
  .btn-copy {
    width: 100%;
    padding: 12px;
    background: #e2e8f0;
    color: #4a5568;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }

  /* ステータス表示 */
  .status-msg {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    display: none;
  }
  .status-ok { background: #c6f6d5; color: #276749; }
  .status-err { background: #fed7d7; color: #c53030; }
  .status-loading { background: #bee3f8; color: #2b6cb0; }

  .loading { text-align: center; color: #a0aec0; font-size: 14px; padding: 20px; }
  .error-msg { color: #c53030; font-size: 13px; margin-top: 6px; display: none; }

  /* 設定エリア */
  .settings-toggle {
    text-align: right;
    margin-bottom: -8px;
  }
  .btn-settings {
    background: none;
    border: none;
    color: #a0aec0;
    font-size: 13px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .settings-area { display: none; margin-top: 8px; }
  .settings-area.open { display: block; }

  /* メモ確認ボタン */
  .btn-memo {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-memo:active { background: #4c51bf; }

  /* メモモーダル */
  .memo-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    padding: 16px;
    overflow-y: auto;
  }
  .memo-overlay.open { display: block; }
  .memo-modal {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    max-width: 500px;
    margin: 0 auto;
  }
  .memo-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .memo-modal-title { font-size: 16px; font-weight: 700; color: #2d3748; }
  .btn-close-memo {
    background: #e2e8f0;
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 16px;
    cursor: pointer;
    color: #4a5568;
  }
  .memo-empty { text-align: center; color: #a0aec0; padding: 20px; font-size: 14px; }
  .memo-item {
    border-left: 3px solid #667eea;
    padding: 8px 10px;
    margin-bottom: 8px;
    background: #f7fafc;
    border-radius: 0 8px 8px 0;
  }
  .memo-item-company { font-size: 14px; font-weight: 700; color: #2d3748; }
  .memo-item-values { font-size: 13px; color: #4a5568; margin-top: 3px; }
  .memo-item-meta { font-size: 11px; color: #a0aec0; margin-top: 3px; }
</style>
</head>
<body>
<h1>📦 計量入力</h1>

<!-- メモ確認ボタン -->
<button class="btn-memo" onclick="showMemo()">📋 メモを確認</button>

<!-- メモモーダル -->
<div class="memo-overlay" id="memo-overlay" onclick="closeMemoOnBg(event)">
  <div class="memo-modal">
    <div class="memo-modal-header">
      <span class="memo-modal-title">📋 メモを確認</span>
      <button class="btn-close-memo" onclick="closeMemo()">✕</button>
    </div>
    <div style="margin-bottom:8px">
      <input type="date" id="memo-date-input" style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;" onchange="onMemoDateChange(this.value)">
    </div>
    <!-- タブ切り替え -->
    <div style="display:flex;border-bottom:1px solid #e2e8f0;margin-bottom:10px;">
      <button id="memo-tab-local" onclick="switchMemoTab('local')"
        style="flex:1;padding:8px;font-size:13px;font-weight:600;border:none;background:#ebf8ff;color:#2b6cb0;cursor:pointer;border-bottom:2px solid #2b6cb0;">
        📱 自分のメモ
      </button>
      <button id="memo-tab-sheets" onclick="switchMemoTab('sheets')"
        style="flex:1;padding:8px;font-size:13px;font-weight:600;border:none;background:white;color:#718096;cursor:pointer;border-bottom:2px solid transparent;">
        📊 スプレッドシート
      </button>
    </div>
    <div id="memo-list-content"></div>
  </div>
</div>

<!-- 入力者 + 設定 -->
<div class="card">
  <div class="settings-toggle">
    <button class="btn-settings" onclick="toggleSettings()">⚙️ 設定</button>
  </div>
  <label>👤 入力者名（任意）</label>
  <input type="text" id="input-by" placeholder="例：田中" oninput="saveInputBy()">
  <div class="settings-area" id="settings-area">
    <label style="margin-top:12px">🔗 Google Apps Script URL</label>
    <input type="text" id="script-url" placeholder="https://script.google.com/macros/s/..." oninput="saveScriptUrl()">
    <div style="font-size:11px;color:#a0aec0;margin-top:4px">スクリプトをウェブアプリとして公開したURLを入力</div>
  </div>
</div>

<!-- 日付 -->
<div class="card">
  <label>📅 収集日</label>
  <input type="date" id="date-input">
</div>

<!-- 会社選択 -->
<div class="card">
  <label>🏢 会社名</label>
  <div id="loading" class="loading">会社リスト読み込み中…</div>
  <select id="company-select" style="display:none">
    <option value="">-- 選択してください --</option>
  </select>
  <div id="load-error" class="error-msg">⚠️ 会社リストの読み込みに失敗しました</div>
</div>

<!-- 入力フィールド -->
<div class="card fields-area" id="fields-area">
  <label>📊 数値入力</label>
  <div id="fields-container"></div>
  <button class="btn-add" id="btn-add" onclick="addEntry()">リストに追加 ＋</button>
</div>

<!-- 入力リスト -->
<div class="card" id="list-area">
  <div class="list-header">
    <span class="list-title">📋 入力リスト</span>
    <button class="btn-clear-all" onclick="clearAll()">全削除</button>
  </div>
  <div id="entry-list"></div>

  <!-- Googleスプレッドシートに保存 -->
  <button class="btn-save" onclick="saveToSheet()">
    📤 Googleスプレッドシートに保存
  </button>

  <!-- コピー（サブ） -->
  <button class="btn-copy" onclick="copyAll()">📋 クリップボードにコピー（Claudeに貼り付け用）</button>

  <!-- ファイルに保存 -->
  <button class="btn-copy" onclick="saveToFileApp()" style="background:#f0fff4;color:#276749;border:1.5px solid #9ae6b4;margin-top:6px;">📁 ファイルに保存（保存先選択）</button>

  <div class="status-msg" id="status-msg"></div>
</div>

<script>
const COMPANIES_JSON_URL = 'companies.json';

let companies = [];
let entries = [];

// 初期化
function init() {
  // 日付
  document.getElementById('date-input').value = getTodayStr();
  // 入力者
  const savedBy = localStorage.getItem('inputBy') || '';
  document.getElementById('input-by').value = savedBy;
  // スクリプトURL（デフォルト設定済み）
  const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwCBRagrPKAS-dPvsYWJJWoDU-xrAztj--Zo2Jy6tLt4qeCSMslBvou3WURipzCgGiW/exec';
  const savedUrl = localStorage.getItem('scriptUrl') || DEFAULT_SCRIPT_URL;
  document.getElementById('script-url').value = savedUrl;
  if (!localStorage.getItem('scriptUrl')) localStorage.setItem('scriptUrl', DEFAULT_SCRIPT_URL);
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function saveInputBy() {
  localStorage.setItem('inputBy', document.getElementById('input-by').value);
}
function saveScriptUrl() {
  localStorage.setItem('scriptUrl', document.getElementById('script-url').value);
}
function toggleSettings() {
  document.getElementById('settings-area').classList.toggle('open');
}

// 会社リスト
async function loadCompanies() {
  try {
    const res = await fetch(COMPANIES_JSON_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    companies = data.companies;
    buildSelect();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('company-select').style.display = 'block';
  } catch {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('load-error').style.display = 'block';
  }
}

function buildSelect() {
  const sel = document.getElementById('company-select');
  companies.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

document.getElementById('company-select').addEventListener('change', function() {
  const id = this.value;
  const area = document.getElementById('fields-area');
  const container = document.getElementById('fields-container');
  container.innerHTML = '';
  if (!id) { area.classList.remove('active'); return; }
  const company = companies.find(c => c.id === id);
  if (!company) return;
  company.fields.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'field-row';
    row.innerHTML = `
      <span class="field-label">${f.label}</span>
      <input type="number" class="field-input" id="field-${i}"
             inputmode="decimal" placeholder="0" min="0" step="any">
      <span class="field-unit">${f.unit}</span>`;
    container.appendChild(row);
  });
  area.classList.add('active');
  setTimeout(() => document.getElementById('field-0')?.focus(), 100);
});

function addEntry() {
  const dateVal = document.getElementById('date-input').value;
  const companyId = document.getElementById('company-select').value;
  if (!dateVal || !companyId) return;
  const company = companies.find(c => c.id === companyId);
  if (!company) return;

  const d = new Date(dateVal);
  const yy = String(d.getFullYear()).slice(-2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');

  const fieldValues = company.fields.map((f, i) => {
    const v = document.getElementById(`field-${i}`)?.value.trim();
    return { label: f.label, unit: f.unit, value: v || '' };
  });

  const parts = fieldValues
    .filter(f => f.value !== '')
    .map(f => `${f.label}${f.value}${f.unit}`);

  const text = `${yy}${mm}${dd} ${company.name}${parts.length ? ' ' + parts.join(' ') : ''}`;

  entries.push({
    date: dateVal,
    companyId,
    companyName: company.name,
    fields: fieldValues,
    text
  });
  renderList();

  // フィールドリセット
  company.fields.forEach((_, i) => {
    const inp = document.getElementById(`field-${i}`);
    if (inp) inp.value = '';
  });
  document.getElementById('field-0')?.focus();
}

function renderList() {
  const listEl = document.getElementById('entry-list');
  const listArea = document.getElementById('list-area');
  listEl.innerHTML = '';
  if (entries.length === 0) { listArea.classList.remove('has-items'); return; }
  listArea.classList.add('has-items');
  entries.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.innerHTML = `
      <span class="list-item-text">${e.text}</span>
      <button class="btn-delete" onclick="deleteEntry(${i})">✕</button>`;
    listEl.appendChild(item);
  });
}

function deleteEntry(i) { entries.splice(i, 1); renderList(); }
function clearAll() {
  if (!confirm('リストをすべて削除しますか？')) return;
  entries = []; renderList();
}

// ===== Googleスプレッドシートに保存 =====
async function saveToSheet() {
  const scriptUrl = localStorage.getItem('scriptUrl') || '';
  if (!scriptUrl || !scriptUrl.startsWith('https://script.google.com')) {
    showStatus('error', '⚙️設定からGoogle Apps ScriptのURLを入力してください');
    return;
  }
  if (entries.length === 0) return;

  const btn = document.querySelector('.btn-save');
  btn.disabled = true;
  showStatus('loading', '📤 Googleスプレッドシートに送信中…');

  const dateVal = document.getElementById('date-input').value;
  const d = new Date(dateVal);
  const month = `${d.getFullYear()}年${d.getMonth()+1}月`;
  const inputBy = document.getElementById('input-by').value;

  let successCount = 0;
  let errorCount = 0;

  for (const entry of entries) {
    try {
      await fetch(scriptUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date: entry.date,
          month: month,
          companyName: entry.companyName,
          fields: entry.fields,
          inputBy: inputBy,
          memo: ''
        })
      });
      successCount++;
    } catch {
      errorCount++;
    }
  }

  btn.disabled = false;

  if (errorCount === 0) {
    // 日付ごとにグループ化してlocalStorageに保存
    const byDate = {};
    entries.forEach(e => {
      if (!byDate[e.date]) byDate[e.date] = [];
      byDate[e.date].push(e);
    });
    Object.entries(byDate).forEach(([date, dateEntries]) => {
      const existing = JSON.parse(localStorage.getItem('savedMemo_' + date) || '[]');
      existing.push(...dateEntries);
      localStorage.setItem('savedMemo_' + date, JSON.stringify(existing));
    });
    showStatus('ok', `✅ ${successCount}件をスプレッドシートに保存しました`);
    setTimeout(() => { entries = []; renderList(); hideStatus(); }, 2500);
  } else {
    showStatus('error', `⚠️ ${successCount}件成功、${errorCount}件失敗。もう一度お試しください。`);
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status-msg');
  el.className = 'status-msg status-' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideStatus() {
  document.getElementById('status-msg').style.display = 'none';
}

// コピー
function copyAll() {
  const text = entries.map(e => e.text).join('\n');
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
  showStatus('ok', '✅ コピーしました');
  setTimeout(hideStatus, 2000);
}

// ===== メモ確認 =====
let currentMemoTab = 'local';
let currentMemoDate = '';

function showMemo() {
  const today = getTodayStr();
  currentMemoDate = today;
  document.getElementById('memo-date-input').value = today;
  document.getElementById('memo-overlay').classList.add('open');
  showMemoForDate(today);
}

function onMemoDateChange(dateStr) {
  currentMemoDate = dateStr;
  if (currentMemoTab === 'local') showMemoForDate(dateStr);
  else fetchSheetsData(dateStr);
}

function switchMemoTab(tab) {
  currentMemoTab = tab;
  const localBtn = document.getElementById('memo-tab-local');
  const sheetsBtn = document.getElementById('memo-tab-sheets');
  if (tab === 'local') {
    localBtn.style.background = '#ebf8ff'; localBtn.style.color = '#2b6cb0'; localBtn.style.borderBottom = '2px solid #2b6cb0';
    sheetsBtn.style.background = 'white'; sheetsBtn.style.color = '#718096'; sheetsBtn.style.borderBottom = '2px solid transparent';
    showMemoForDate(currentMemoDate);
  } else {
    sheetsBtn.style.background = '#ebf8ff'; sheetsBtn.style.color = '#2b6cb0'; sheetsBtn.style.borderBottom = '2px solid #2b6cb0';
    localBtn.style.background = 'white'; localBtn.style.color = '#718096'; localBtn.style.borderBottom = '2px solid transparent';
    fetchSheetsData(currentMemoDate);
  }
}

function fetchSheetsData(dateStr) {
  const url = localStorage.getItem('scriptUrl') || '';
  const content = document.getElementById('memo-list-content');
  if (!url) {
    content.innerHTML = '<div class="memo-empty">⚙ 設定でApps Script URLを入力してください</div>';
    return;
  }
  const parts = dateStr.split('-');
  const monthParam = parts[0] + '年' + parseInt(parts[1]) + '月';
  content.innerHTML = '<div class="memo-empty">📡 スプレッドシートから取得中...</div>';
  fetch(url + '?date=' + dateStr + '&month=' + encodeURIComponent(monthParam))
    .then(r => r.json())
    .then(data => {
      if (!data.records || !data.records.length) {
        content.innerHTML = '<div class="memo-empty">この日のスプレッドシート記録はありません</div>';
        return;
      }
      content.innerHTML = '';
      const header = document.createElement('div');
      header.style.cssText = 'font-size:13px;color:#718096;margin-bottom:8px;font-weight:600;';
      const d = new Date(dateStr);
      header.textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日　${data.records.length}件（全スタッフ）`;
      content.appendChild(header);
      data.records.forEach(r => {
        const company = r['会社名'] || '';
        const staff = r['入力者'] || '';
        const vals = ['可燃(袋)','可燃(kg)','不燃(袋)','不燃(kg)','カン(kg)','ビン(kg)','生ごみ(kg)','段ボール(kg)','アラ(kg)','PET(袋)','その他(袋)','その他(kg)']
          .filter(k => r[k] !== '' && r[k] !== null && r[k] !== undefined)
          .map(k => `${k}:${r[k]}`).join('　');
        const div = document.createElement('div');
        div.className = 'memo-item';
        div.innerHTML = `
          <div class="memo-item-company">🏢 ${company}</div>
          <div class="memo-item-values">${vals || '（数値なし）'}</div>
          ${staff ? `<div class="memo-item-meta">👤 ${staff}</div>` : ''}`;
        content.appendChild(div);
      });
    })
    .catch(err => {
      content.innerHTML = '<div class="memo-empty">⚠ 取得エラー: ' + err.message + '</div>';
    });
}

function showMemoForDate(dateStr) {
  if (!dateStr) return;
  const stored = JSON.parse(localStorage.getItem('savedMemo_' + dateStr) || '[]');
  // 当日かつ未保存の入力中エントリも表示
  const pendingForDate = entries.filter(e => e.date === dateStr);
  const allItems = [...stored, ...pendingForDate];

  const content = document.getElementById('memo-list-content');
  content.innerHTML = '';

  if (allItems.length === 0) {
    const d = new Date(dateStr);
    content.innerHTML = `<div class="memo-empty">${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日の入力はありません</div>`;
  } else {
    const d = new Date(dateStr);
    const header = document.createElement('div');
    header.style.cssText = 'font-size:13px;color:#718096;margin-bottom:8px;font-weight:600;';
    header.textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日　${allItems.length}件`;
    content.appendChild(header);

    allItems.forEach(e => {
      const vals = e.fields
        .filter(f => f.value !== '')
        .map(f => `${f.label}${f.value}${f.unit}`)
        .join('　');
      const div = document.createElement('div');
      div.className = 'memo-item';
      const inputBy = e.inputBy || localStorage.getItem('inputBy') || '';
      div.innerHTML = `
        <div class="memo-item-company">🏢 ${e.companyName}</div>
        <div class="memo-item-values">${vals || '（入力なし）'}</div>
        ${inputBy ? `<div class="memo-item-meta">👤 ${inputBy}</div>` : ''}`;
      content.appendChild(div);
    });
  }
}

function closeMemo() {
  document.getElementById('memo-overlay').classList.remove('open');
}

// ===== ファイルに保存（保存先選択）=====
function saveToFileApp() {
  if (entries.length === 0) { showStatus('error', '入力リストが空です'); return; }
  const dateVal = document.getElementById('date-input').value || getTodayStr();
  const company = document.getElementById('company-select').value || '未選択';
  const inputBy = document.getElementById('input-by').value || '';
  const label = dateVal.replace(/-/g,'');

  const lines = [`=== 計量メモ ${label} ===\n`];
  const t = new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  lines.push(`[${t}] ${inputBy ? '【'+inputBy+'】' : ''}${company}　${dateVal}`);
  entries.forEach(e => {
    if (e.value) lines.push(`  ${e.label}: ${e.value}${e.unit}`);
  });
  lines.push('');

  const filename = `計量メモ_${label}.txt`;
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showStatus('ok', '📁 ファイルアプリで保存先を選んでください');
}

function closeMemoOnBg(e) {
  if (e.target === document.getElementById('memo-overlay')) closeMemo();
}

// Enterキー
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.classList.contains('field-input')) {
    const idx = parseInt(document.activeElement.id.split('-')[1]);
    const next = document.getElementById(`field-${idx+1}`);
    if (next) next.focus(); else addEntry();
  }
});

init();
loadCompanies();
</script>
